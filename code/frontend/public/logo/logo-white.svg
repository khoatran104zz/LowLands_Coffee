<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <linearGradient id="white-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#EAEAEA" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Logo Icon -->
  <g transform="translate(10, 10)">
    <!-- Lowlands Gentle Curves -->
    <path d="M 10 65 Q 40 45, 70 65 T 130 65" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" />
    <path d="M 20 75 Q 50 60, 80 75 T 120 75" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.4" />
    
    <!-- Coffee Bean Silhouette -->
    <g transform="translate(45, 10) scale(0.9)" filter="url(#shadow)">
      <!-- Left half of bean -->
      <path d="M 25 5 C 10 15, 5 35, 20 45 C 23 47, 26 42, 26 40 C 20 30, 20 20, 26 10 C 26 8, 25 6, 25 5 Z" fill="#FFFFFF" opacity="0.7" />
      <!-- Right half of bean -->
      <path d="M 28 5 C 43 15, 48 35, 33 45 C 30 47, 27 42, 27 40 C 33 30, 33 20, 27 10 C 27 8, 28 6, 28 5 Z" fill="url(#white-grad)" />
      <!-- Center curved line (coffee bean crack) -->
      <path d="M 25 5 Q 28 25, 25 45" fill="none" stroke="#241a15" stroke-width="2.5" stroke-linecap="round" />
    </g>
  </g>

  <!-- Logo Typography -->
  <g transform="translate(150, 48)">
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="24" font-weight="900" letter-spacing="4" fill="#FFFFFF">LOWLANDS</text>
    <text font-family="'Outfit', 'Inter', sans-serif" font-size="10" font-weight="600" letter-spacing="6" fill="#FFFFFF" y="24">COFFEE &amp; TEA</text>
  </g>
</svg>
