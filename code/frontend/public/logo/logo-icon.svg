<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5A880" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Lowlands Gentle Curves (Vùng đất thấp) -->
  <path d="M 5 65 Q 27.5 45, 50 65 T 95 65" fill="none" stroke="url(#gold-grad)" stroke-width="4.5" stroke-linecap="round" />
  <path d="M 12.5 75 Q 31.25 60, 50 75 T 87.5 75" fill="none" stroke="#4A2C2A" stroke-width="3" stroke-linecap="round" opacity="0.6" />
  
  <!-- Coffee Bean Silhouette -->
  <g transform="translate(25, 10)" filter="url(#shadow)">
    <!-- Left half of bean -->
    <path d="M 25 5 C 10 15, 5 35, 20 45 C 23 47, 26 42, 26 40 C 20 30, 20 20, 26 10 C 26 8, 25 6, 25 5 Z" fill="#4A2C2A" />
    <!-- Right half of bean -->
    <path d="M 28 5 C 43 15, 48 35, 33 45 C 30 47, 27 42, 27 40 C 33 30, 33 20, 27 10 C 27 8, 28 6, 28 5 Z" fill="url(#gold-grad)" />
    <!-- Center curved line (coffee bean crack) -->
    <path d="M 25 5 Q 28 25, 25 45" fill="none" stroke="#F7F3E9" stroke-width="2.5" stroke-linecap="round" />
  </g>
</svg>
