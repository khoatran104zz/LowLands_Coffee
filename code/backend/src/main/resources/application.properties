spring.application.name=coffee

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/lowlands_coffee}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${JWT_SECRET:lowlands-coffee-default-secret-key-change-me-please-32chars}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

app.bootstrap.admin-email=${BOOTSTRAP_ADMIN_EMAIL:admin@lowlands.coffee}
app.bootstrap.admin-password=${BOOTSTRAP_ADMIN_PASSWORD:Admin@123}
app.bootstrap.admin-full-name=${BOOTSTRAP_ADMIN_FULL_NAME:Lowlands Admin}
